# Coolify deployment: Duplicate Guard landing page
# Deploy from this directory or point Coolify at it.

services:
  landing-page:
    build:
      context: .
      dockerfile: Dockerfile
    image: duplicate-guard-landing
    container_name: duplicate-guard-landing
    restart: unless-stopped
    ports:
      - "80:80"
    # Optional: uncomment to use env-based domain or healthcheck
    # environment:
    #   - TZ=UTC
    # healthcheck:
    #   test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:80/"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 5s
